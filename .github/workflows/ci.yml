name: Antigravity OS CI - Engineering Intelligence Audit

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. STANDARDS & COMPLIANCE GATE (NASA-STD-8006)
  engineering-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install Industrial Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgmsh-dev
        pip install -r requirements.txt
        
    - name: Run NASA-STD-8006 Compliance Audit
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python packages/reasoning_engine/tests/test_compliance.py
      
  # 2. CORE SYSTEM TESTS
  system-tests:
    runs-on: ubuntu-latest
    needs: engineering-audit
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Run Orchestrator Logic Tests
      run: |
        pip install pytest
        pytest apps/api/tests/

  # 3. WEB COCKPIT INTEGRITY
  web-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    - name: Build Web Cockpit
      run: |
        cd apps/web
        npm install
        npm run build
