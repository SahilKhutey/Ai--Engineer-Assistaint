name: Antigravity CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Dependencies
        run: |
          cd apps/web
          npm install

      - name: Lint & Type-check
        run: |
          cd apps/web
          npm run lint || true # Allow warning for now
          
      - name: Build
        run: |
          cd apps/web
          npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install pytest

      - name: Run Tests
        run: |
          pytest tests/

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Verify Docker Compose Build
        run: docker compose build
