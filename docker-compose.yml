version: '3.8'

services:
  # 1. API Gateway (Engineering Intelligence Orchestrator)
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
    depends_on:
      - redis
      - qdrant

  # 2. Compute Workers (Distributed Physics/Geometry Pool)
  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: celery -A apps.worker.celery_app worker --loglevel=info --concurrency=1
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  # 3. Web Interface (XR Workspace & Command Center)
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

  # 4. Infrastructure Services
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
