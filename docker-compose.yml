version: '3.9'

services:
  web:
    build: ./apps/web
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

  api:
    build: ./apps/api
    ports:
      - '8000:8000'
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://antiogravity:password@postgres:5432/engineering
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333

  worker:
    build: ./apps/api
    command: celery -A worker worker --loglevel=info
    depends_on:
      - redis
      - qdrant
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: antiogravity
      POSTGRES_PASSWORD: password
      POSTGRES_DB: engineering
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - ./qdrant_db:/qdrant/storage
